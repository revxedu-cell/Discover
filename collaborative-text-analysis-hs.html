<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Collaborative Text Analysis вЂ” DEEDS Examine (9вЂ“12)</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>

:root {
  --phase:#0a7a14; --phase-light:#e8f7ea; --phase-mid:#bbf7d0; --phase-dark:#065f0c;
  --text:#072b0a; --text-mid:#3d6b43; --text-soft:#6b9b72;
  --border:#d4ead6; --bg:#f0faf1; --white:#fff;
  --m-ind-bg:#EFF6FF; --m-ind-b:#BFDBFE; --m-ind-t:#1D4ED8;
  --m-pair-bg:#F0FDF4; --m-pair-b:#BBF7D0; --m-pair-t:#15803D;
  --m-sm-bg:#FAF5FF;  --m-sm-b:#DDD6FE;  --m-sm-t:#6D28D9;
  --m-wh-bg:#FFF7ED;  --m-wh-b:#FED7AA;  --m-wh-t:#C2410C;
  --m-voc-bg:#FEF9C3; --m-voc-b:#FDE047; --m-voc-t:#854D0E;
  --t-bg:#072b0a; --t-s:rgba(255,255,255,.06); --t-l:rgba(255,255,255,.09);
  --t-text:rgba(255,255,255,.88); --t-soft:rgba(255,255,255,.55);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Nunito Sans',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }

/* в”Ђв”Ђ TOPBAR в”Ђв”Ђ */
.topbar {
  position:sticky; top:0; z-index:50; background:white;
  border-bottom:1px solid var(--border);
  padding:9px 20px; display:flex; align-items:center;
  justify-content:space-between; gap:10px; flex-wrap:wrap;
}
.tl { display:flex; align-items:center; gap:9px; }
.back-btn {
  display:inline-flex; align-items:center; gap:5px;
  font-family:'Nunito',sans-serif; font-weight:700; font-size:12px;
  color:var(--text-soft); text-decoration:none; padding:5px 10px 5px 6px;
  border-radius:6px; border:1.5px solid var(--border); background:white; transition:all .15s;
}
.back-btn:hover { border-color:var(--phase); color:var(--phase); }
.phase-pill { font-family:'Nunito',sans-serif; font-weight:900; font-size:11px; letter-spacing:.15em; color:white; background:var(--phase); padding:4px 11px; border-radius:5px; }
.grade-pill { font-family:'Nunito',sans-serif; font-weight:900; font-size:11px; letter-spacing:.08em; color:var(--phase-dark); background:var(--phase-light); border:1.5px solid var(--phase-mid); padding:4px 10px; border-radius:5px; }
.deck-label { font-family:'Nunito',sans-serif; font-weight:700; font-size:13px; color:var(--text-mid); }
.ctrl-area { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.tg { display:flex; background:var(--bg); border-radius:7px; padding:3px; gap:2px; }
.tb { font-family:'Nunito',sans-serif; font-weight:700; font-size:11px; padding:4px 10px; border:none; border-radius:5px; cursor:pointer; background:transparent; color:var(--text-soft); transition:all .15s; }
.tb.active { background:white; color:var(--phase-dark); box-shadow:0 1px 3px rgba(0,0,0,.1); }
.subj-tg { display:flex; background:var(--bg); border-radius:7px; padding:3px; gap:2px; }
.subj-tb { font-family:'Nunito',sans-serif; font-weight:800; font-size:11px; padding:5px 11px; border:none; border-radius:5px; cursor:pointer; background:transparent; color:var(--text-soft); transition:all .15s; white-space:nowrap; }
.subj-tb.active { background:var(--phase); color:white; box-shadow:0 1px 4px rgba(10,122,20,.35); }
.phase-nav { display:flex; align-items:center; gap:6px; }
.nav-btn { width:30px; height:30px; border-radius:6px; border:1.5px solid var(--border); background:white; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-mid); font-size:13px; transition:all .15s; }
.nav-btn:hover:not(:disabled) { border-color:var(--phase); color:var(--phase); }
.nav-btn:disabled { opacity:.3; cursor:not-allowed; }
.slide-ctr { font-family:'Nunito',sans-serif; font-weight:800; font-size:12px; color:var(--text-mid); min-width:54px; text-align:center; white-space:nowrap; }

/* в”Ђв”Ђ PAGE LAYOUT в”Ђв”Ђ */
.page { max-width:1080px; margin:24px auto; padding:0 20px 40px; }
.subj-panel { display:none; }
body.subj-cr  .subj-panel.cr  { display:block; }
body.subj-cta .subj-panel.cs  { display:block; }
body.subj-css .subj-panel.css { display:block; }
.hs-slide { display:none; }
.hs-slide.active { display:block; }

/* в”Ђв”Ђ STUDENT CARD в”Ђв”Ђ */
.sc { background:white; border-radius:14px; box-shadow:0 2px 20px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04); overflow:hidden; min-height:520px; display:none; flex-direction:column; }
body.subj-cr.vs  #cr9-panel .sc,
body.subj-cta.vs #cs9-panel .sc,
body.subj-css.vs #css9-panel .sc { display:flex; }
.sh { flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; padding:13px 24px; border-bottom:1px solid #f0f7f1; }
.shl { display:flex; align-items:center; gap:9px; }
.type-badge { font-family:'Nunito',sans-serif; font-weight:800; font-size:10px; letter-spacing:.1em; padding:4px 10px; border-radius:4px; text-transform:uppercase; }
.badge-r { color:#3d6b43; background:var(--phase-light); border:1px solid var(--phase-mid); }
.phase-num-badge { font-family:'Nunito',sans-serif; font-weight:900; font-size:10px; letter-spacing:.1em; padding:4px 11px; border-radius:4px; text-transform:uppercase; color:white; background:var(--phase-dark); }
.timer { font-family:'Nunito',sans-serif; font-weight:800; font-size:13.5px; color:var(--text-mid); }
.sb { flex:1; min-height:0; display:flex; flex-direction:column; padding:18px 24px 14px; }
.s-phase-label { font-family:'Nunito',sans-serif; font-weight:900; font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--phase); margin-bottom:4px; flex-shrink:0; }
.s-title { font-family:'Nunito',sans-serif; font-weight:900; font-size:34px; color:var(--text); line-height:1.05; margin-bottom:5px; flex-shrink:0; }
.s-sub { font-size:15px; font-weight:600; color:var(--text-mid); margin-bottom:14px; flex-shrink:0; }

/* cards row */
.cr { flex:1; min-height:0; display:flex; align-items:stretch; }
.cw { flex:1; display:flex; }
.pc { flex:1; border-radius:10px; padding:12px 10px 10px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:5px; overflow:hidden; }
.pd { border:2px dashed var(--phase); }
.pr { border:2px dashed #86efac; background:#f8fff9; }
.pv { border:2px dashed var(--m-voc-b); background:#FEFCE8; }
.card-arrow { flex:0 0 16px; display:flex; align-items:center; justify-content:center; color:var(--phase); font-size:14px; font-weight:900; flex-shrink:0; }
.cm { display:flex; align-items:center; justify-content:space-between; width:100%; }
.mode-pill { font-family:'Nunito',sans-serif; font-weight:800; font-size:11px; letter-spacing:.05em; padding:2px 6px; border-radius:20px; white-space:nowrap; }
.m-ind  { background:var(--m-ind-bg);  border:1px solid var(--m-ind-b);  color:var(--m-ind-t); }
.m-pair { background:var(--m-pair-bg); border:1px solid var(--m-pair-b); color:var(--m-pair-t); }
.m-sm   { background:var(--m-sm-bg);   border:1px solid var(--m-sm-b);   color:var(--m-sm-t); }
.m-wh   { background:var(--m-wh-bg);   border:1px solid var(--m-wh-b);   color:var(--m-wh-t); }
.m-voc  { background:var(--m-voc-bg);  border:1px solid var(--m-voc-b);  color:var(--m-voc-t); }
.c-time { font-family:'Nunito',sans-serif; font-weight:700; font-size:10px; color:var(--text-soft); }
.c-icon { font-size:28px; line-height:1; flex-shrink:0; }
.c-label { font-family:'Nunito',sans-serif; font-weight:900; font-size:16px; color:var(--text); flex-shrink:0; }
.c-prompt { font-size:13px; color:var(--text-mid); line-height:1.4; }
.c-starter { font-size:12px; color:var(--text-soft); font-style:italic; line-height:1.35; }
.annot-key { display:flex; flex-wrap:wrap; gap:3px; justify-content:center; margin-top:2px; }
.ak { font-family:'Nunito',sans-serif; font-weight:800; font-size:9px; background:#f0f7f1; border:1px solid var(--phase-mid); color:var(--phase-dark); border-radius:4px; padding:2px 5px; }

/* CER badge */
.cer-row { display:flex; gap:6px; justify-content:center; margin-top:3px; }
.cer-badge { font-family:'Nunito',sans-serif; font-weight:900; font-size:10px; padding:3px 8px; border-radius:4px; }
.cer-c { background:#EFF6FF; border:1px solid #BFDBFE; color:#1D4ED8; }
.cer-e { background:#F0FDF4; border:1px solid #BBF7D0; color:#15803D; }
.cer-r { background:#FAF5FF; border:1px solid #DDD6FE; color:#6D28D9; }

/* phase dots */
.phase-dots { display:flex; justify-content:center; gap:8px; padding:12px 0 0; }
.phase-dot { width:28px; height:6px; border-radius:3px; background:var(--phase-mid); cursor:pointer; transition:all .2s; }
.phase-dot.active { background:var(--phase); width:36px; }

/* в”Ђв”Ђ TEACHER CARD в”Ђв”Ђ */
.tc2 { background:var(--t-bg); border-radius:14px; box-shadow:0 2px 20px rgba(0,0,0,.2); overflow:hidden; min-height:500px; display:none; flex-direction:column; }
body.subj-cr.vt  #cr9-panel .tc2,
body.subj-cta.vt #cs9-panel .tc2,
body.subj-css.vt #css9-panel .tc2 { display:flex; }
.t-hdr { flex:0 0 auto; background:var(--phase); padding:15px 24px; display:flex; align-items:flex-start; justify-content:space-between; gap:14px; }
.t-hdr-l { display:flex; flex-direction:column; gap:3px; }
.t-ey { font-family:'Nunito',sans-serif; font-weight:700; font-size:10px; letter-spacing:.18em; color:rgba(255,255,255,.75); text-transform:uppercase; }
.t-ttl { font-family:'Nunito',sans-serif; font-weight:900; font-size:20px; color:white; }
.t-meta { display:flex; flex-direction:column; align-items:flex-end; gap:2px; background:rgba(0,0,0,.15); border-radius:7px; padding:7px 12px; flex-shrink:0; }
.t-ml { font-family:'Nunito',sans-serif; font-weight:700; font-size:9px; letter-spacing:.12em; color:rgba(255,255,255,.6); text-transform:uppercase; }
.t-mv { font-family:'Nunito',sans-serif; font-weight:800; font-size:12px; color:white; }
.t-body { flex:1; padding:14px 24px 18px; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr auto auto; gap:12px; }
.t-sec { background:var(--t-s); border-radius:9px; padding:12px 13px; overflow:hidden; }
.t-sec-title { font-family:'Nunito',sans-serif; font-weight:900; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--phase-mid); margin-bottom:8px; }
.fac-list { list-style:none; display:flex; flex-direction:column; gap:4px; overflow:auto; }
.fac-list li { font-size:11.5px; color:var(--t-soft); line-height:1.4; padding-left:12px; position:relative; }
.fac-list li::before { content:'вЂє'; position:absolute; left:0; color:var(--phase-mid); font-weight:900; }
.why-box { grid-column:1/-1; border-left:3px solid var(--phase-mid); background:rgba(10,122,20,.1); border-radius:0 9px 9px 0; padding:10px 13px; }
.why-l { font-family:'Nunito',sans-serif; font-weight:900; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--phase-mid); margin-bottom:3px; }
.why-t { font-size:12.5px; color:var(--t-text); line-height:1.55; }
.std-row { grid-column:1/-1; display:flex; align-items:flex-start; gap:8px; padding-top:9px; border-top:1px solid var(--t-l); }
.std-l { font-family:'Nunito',sans-serif; font-weight:900; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--phase-mid); white-space:nowrap; padding-top:1px; }
.std-v { font-size:11px; color:var(--t-soft); line-height:1.45; }

@media print {
  .topbar { display:none; }
  .page { margin:0; padding:0; max-width:100%; }
  .hs-slide { display:block !important; page-break-after:always; }
  .sc,.tc2 { display:flex !important; box-shadow:none; border-radius:0; }
  body.vs .tc2, body.vt .sc { display:none !important; }
}
</style>

<script>

const MC  = { individual:'m-ind', pair:'m-pair', small:'m-sm', whole:'m-wh', vocab:'m-voc' };
const ML  = { individual:'вњЏпёЏ\u202FIndividual', pair:'рџ‘Ґ\u202FPartner', small:'в—Ћ\u202FSmall Group', whole:'в—Ћ\u202FWhole Class', vocab:'рџ“љ\u202FVocab Preview' };
const PC  = { individual:'pr', pair:'pr', small:'pr', whole:'pr', vocab:'pv' };

/* в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
   COLLABORATIVE READING вЂ” 9вЂ“12
в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ */

const CR9_PHASES = [

{
  num:1, name:`Central Claim & Author's Purpose`, label:`Phase 1 В· Claim & Purpose`, timer:`9вЂ“10 min`,
  purpose:`Read with a partner. What is the central claim? What does the author want you to think, believe, or do вЂ” and how do you know?`,
  steps:[
    { mode:`vocab`,      time:`1вЂ“2 min`, icon:`рџ“љ`, label:`Vocabulary Preview`,
      prompt:`Key terms have been introduced. Write down 2вЂ“3 terms and brief definitions. You'll use these in Phase 3 and Phase 5.`,
      starter:`Term: ___ В· Meaning in context: ___` },
    { mode:`pair`,       time:`4вЂ“5 min`, icon:`рџ‘Ґ`, label:`Partner Read`,
      prompt:`One partner reads aloud while the other tracks: What is the central claim? What does the author want you to think or do? Switch halfway.`,
      starter:`The central claim seems to beвЂ¦ / The author's purpose appears to beвЂ¦` },
    { mode:`individual`, time:`2 min`,   icon:`рџ”Ќ`, label:`Identify Claim & Purpose`,
      prompt:`Write the central claim in one sentence. Then write the author's purpose вЂ” what do they want you to think, believe, or do?`,
      starter:`The author's central claim isвЂ¦ / The author's purpose is toвЂ¦ / I know this becauseвЂ¦` },
    { mode:`whole`,      time:`2 min`,   icon:`рџ’¬`, label:`Share & Challenge`,
      prompt:`State the claim and purpose. Others: agree, refine, or offer an alternative reading.`,
      starter:`I read the central claim asвЂ¦ / I'd push back on that becauseвЂ¦ / The author's purpose seems to beвЂ¦ based onвЂ¦` }
  ],
  teacher:{
    obj:`Students identify the central claim and author's purpose, distinguishing between what the text says and what the author wants the reader to believe.`,
    vocabNote:`Before the partner read, introduce 2вЂ“3 key terms students will be expected to use in Phase 3 and Phase 5 responses. Don't define exhaustively вЂ” give enough to not block comprehension. Students should encounter the words again in the text.`,
    notes:[
      `Partner reading at 9вЂ“12 serves fluency support and comprehension вЂ” the listening focus ("track: what is the central claim?") keeps both partners cognitively active.`,
      `For particularly dense texts, read aloud once yourself before the partner read. This is especially useful for primary sources, scientific abstracts, or texts with complex syntax.`,
      `Distinguishing claim from purpose is the move that separates passive reading from critical reading. At 9вЂ“12, students should read every text as a rhetorical act.`,
      `Require vocabulary use explicitly in Phase 3 and Phase 5 вЂ” announce this before Phase 1 so students know what the terms are for.`
    ],
    why:`At 9вЂ“12, students should be reading every text as a rhetorical act. Identifying the author's purpose вЂ” not just the claim вЂ” is the foundation of source evaluation, which drives Phase 4.`,
    std:`CCSS RI.2 В· RI.6 В· SL.1`
  }
},

{
  num:2, name:`Annotation`, label:`Phase 2 В· Deep Annotation`, timer:`9 min`,
  purpose:`Annotate for argument structure, assumptions, and what's absent вЂ” not just what's there. Write a note next to every marking.`,
  steps:[
    { mode:`individual`, time:`5 min`,   icon:`вњЏпёЏ`, label:`Read & Annotate`,
      prompt:`Re-read with your full annotation set. Write a phrase next to every marking вЂ” explain your thinking, not just the symbol.`,
      annot:['в­ђ key idea','E evidence','вќ“ question','в†’ connection','! surprising','P perspective','A assumption','вњ— absent / missing'] },
    { mode:`pair`,       time:`2 min`,   icon:`рџ‘Ґ`, label:`Partner Compare`,
      prompt:`Compare annotations. Focus specifically: did you mark the same assumptions? Did you notice the same absences?`,
      starter:`I marked [A/вњ—] atвЂ¦ becauseвЂ¦ / I didn't noticeвЂ¦ until my partner pointed outвЂ¦ / The most significant absence isвЂ¦ becauseвЂ¦` },
    { mode:`whole`,      time:`2 min`,   icon:`рџ’¬`, label:`Share`,
      prompt:`What assumptions did the author make? What is missing from this text? How do those absences affect the argument?` }
  ],
  teacher:{
    obj:`Students annotate for argument structure, authorial assumptions, and significant absences вЂ” moving beyond content identification to rhetorical analysis.`,
    vocabNote:`Remind students which vocabulary terms from Phase 1 to watch for as they annotate. A vocabulary term appearing in a key claim is worth marking with both E and the term itself.`,
    notes:[
      `The A (assumption) and вњ— (absent/missing) markings are the most analytically demanding вЂ” they require students to read what isn't there. Model explicitly before releasing: "What does the author assume you already believe? What evidence or perspective would change this argument?"`,
      `Annotations at this level should be phrases, not words. "evidence" as a label is not enough; "evidence that contradicts the claim in paragraph 3" is.`,
      `Partner comparison should focus on A and вњ— markings specifically вЂ” discrepancies here surface the most productive discussion for Phase 5.`,
      `The ability to identify assumptions and absences is the foundation of source evaluation, historiography, and argument deconstruction вЂ” skills that appear on AP exams, college writing tasks, and civic reasoning.`
    ],
    why:`Rhetorical analysis at 9вЂ“12 means reading for what an author chose not to say as much as what they said. The A and вњ— markings make this visible and discussable.`,
    std:`CCSS RI.1 В· RI.6 В· RI.8`
  }
},

{
  num:3, name:`CER вЂ” Claim, Evidence, Reasoning`, label:`Phase 3 В· CER Response`, timer:`9 min`,
  purpose:`Answer the question using CER format. Your response must include a claim, at least two pieces of evidence, and reasoning that explains why the evidence supports the claim. Use at least one vocabulary word.`,
  steps:[
    { mode:`whole`,      time:`1 min`,   icon:`рџ”„`, label:`Introduce`,
      prompt:`Connect to Phase 1 claim and author's purpose. Today's question requires a full CER response. Vocabulary use required.`,
      cer: true },
    { mode:`individual`, time:`1 min`,   icon:`рџ”Ќ`, label:`Annotate the Question`,
      prompt:`What is the question asking? Underline the key analytical task.`,
      annot:['How does the author use [structure/rhetoric] to develop the claim?','What assumptions does this text make?','How does the author\'s purpose shape the evidence?','What does this text leave out, and how does that affect the argument?'] },
    { mode:`individual`, time:`5 min`,   icon:`вњЌпёЏ`, label:`Write Your CER`,
      prompt:`C: State your claim. E: Cite two pieces of evidence precisely. R: Explain how and why the evidence supports the claim. Use at least one vocabulary word.`,
      starter:`I argue that [claim]вЂ¦ / The evidence that supports this is [E1]вЂ¦ and [E2]вЂ¦ / This demonstrates [reasoning] becauseвЂ¦ / The term [vocabulary] is relevant here becauseвЂ¦` },
    { mode:`whole`,      time:`2 min`,   icon:`рџ’¬`, label:`Share & Evaluate`,
      prompt:`One student shares. Class evaluates: Is the claim arguable? Is the evidence precise? Does the reasoning actually connect them?`,
      starter:`The claim is arguable becauseвЂ¦ / The evidence would be stronger ifвЂ¦ / The reasoning doesn't yet explain whyвЂ¦` }
  ],
  teacher:{
    obj:`Students write a full CER response to an analytical question, citing precise evidence and explaining the reasoning that connects evidence to claim. Vocabulary use required.`,

/* в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
   RENDER FUNCTIONS
в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ */

const MC9  = { individual:'m-ind', pair:'m-pair', small:'m-sm', whole:'m-wh', vocab:'m-voc' };
const ML9  = { individual:'вњЏпёЏ\u202FIndividual', pair:'рџ‘Ґ\u202FPartner', small:'в—Ћ\u202FSmall Group', whole:'в—Ћ\u202FWhole Class', vocab:'рџ“љ\u202FVocab Preview' };
const PC9  = { individual:'pr', pair:'pr', small:'pr', whole:'pr', vocab:'pv' };

function buildCard9(step) {
  const mc = MC9[step.mode] || 'm-wh';
  const ml = ML9[step.mode] || step.mode;
  const pc = PC9[step.mode] || 'pr';
  const starter = step.starter ? `<div class="c-starter">${step.starter}</div>` : '';
  const annotKey = step.annot ? `<div class="annot-key">${step.annot.map(a=>`<span class="ak">${a}</span>`).join('')}</div>` : '';
  const cerRow = step.cer ? `<div class="cer-row"><span class="cer-badge cer-c">C Claim</span><span class="cer-badge cer-e">E Evidence</span><span class="cer-badge cer-r">R Reasoning</span></div>` : '';
  return `<div class="cw"><div class="pc ${pc}">
    <div class="cm"><span class="mode-pill ${mc}">${ml}</span><span class="c-time">вЏі\u202F${step.time}</span></div>
    <div class="c-icon">${step.icon}</div>
    <div class="c-label">${step.label}</div>
    <div class="c-prompt">${step.prompt}</div>
    ${cerRow}${annotKey}${starter}
  </div></div>`;
}

function buildSlide9(ph, idx, subject, prefix) {
  const cards = ph.steps.map((s,i)=>buildCard9(s)+(i<ph.steps.length-1?'<div class="card-arrow">вЂє</div>':'')).join('');
  const fac = ph.teacher.notes.map(n=>`<li>${n}</li>`).join('');
  const vocabNote = ph.teacher.vocabNote ? `<div style="background:var(--m-voc-bg);border:1px solid var(--m-voc-b);border-radius:7px;padding:8px 11px;margin-bottom:8px;"><div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--m-voc-t);margin-bottom:3px;">Vocabulary Note</div><div style="font-size:11px;color:#713F12;line-height:1.4;">${ph.teacher.vocabNote}</div></div>` : '';
  return `
  <div class="hs-slide${idx===0?' active':''}" data-idx="${idx}">
    <div class="sc">
      <div class="sh">
        <div class="shl">
          <span class="phase-pill">EXAMINE</span>
          <span class="phase-num-badge">Phase ${ph.num}</span>
          <span class="type-badge badge-r">${subject}</span>
        </div>
        <div class="timer">вЏ±\u202F${ph.timer}</div>
      </div>
      <div class="sb">
        <div class="s-phase-label">${ph.label}</div>
        <div class="s-title">${ph.name}</div>
        <div class="s-sub">${ph.purpose}</div>
        <div class="cr">${cards}</div>
      </div>
    </div>
    <div class="tc2">
      <div class="t-hdr">
        <div class="t-hdr-l">
          <div class="t-ey">Teacher Background вЂ” ${subject} (9вЂ“12)</div>
          <div class="t-ttl">${ph.label}</div>
        </div>
        <div class="t-meta">
          <div class="t-ml">Objective</div>
          <div class="t-mv" style="font-size:10px;max-width:170px;text-align:right;line-height:1.3">${ph.teacher.obj}</div>
        </div>
      </div>
      <div class="t-body">
        <div class="t-sec" style="grid-column:1/-1;">
          <div class="t-sec-title">Facilitation Notes</div>
          ${vocabNote}
          <ul class="fac-list">${fac}</ul>
        </div>
        <div class="why-box"><div class="why-l">Why this phase, why now</div><div class="why-t">${ph.teacher.why}</div></div>
        <div class="std-row"><div class="std-l">Standards</div><div class="std-v">${ph.teacher.std}</div></div>
      </div>
    </div>
    <div class="phase-dots" id="${prefix}dots${idx}"></div>
  </div>`;
}

function buildPanel9(phases, panelId, subject, prefix) {
  const panel = document.getElementById(panelId);
  panel.innerHTML = phases.map((ph,i)=>buildSlide9(ph,i,subject,prefix)).join('');
  const dotsHTML = phases.map((_,i)=>`<div class="phase-dot" id="${prefix}dot${i}" onclick="goToPhase(${i})"></div>`).join('');
  document.querySelectorAll(`[id^="${prefix}dots"]`).forEach(el => { el.innerHTML = dotsHTML; });
}

/* в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
   NAVIGATION
в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ */

let currentPhase = 0;

function getConfig9() {
  const b = document.body;
  if(b.classList.contains('subj-cta')) return { phases:CS9_PHASES,  panelId:'cs9-panel',  prefix:'cs9'  };
  if(b.classList.contains('subj-css')) return { phases:CSS9_PHASES, panelId:'css9-panel', prefix:'css9' };
  return { phases:CR9_PHASES, panelId:'cr9-panel', prefix:'cr9' };
}

function goToPhase(idx) {
  const { panelId } = getConfig9();
  document.querySelectorAll(`#${panelId} .hs-slide`).forEach(s => s.classList.remove('active'));
  const t = document.querySelector(`#${panelId} .hs-slide[data-idx="${idx}"]`);
  if(t) t.classList.add('active');
  currentPhase = idx;
  updateNav9();
}

function prevPhase() { if(currentPhase > 0) goToPhase(currentPhase - 1); }
function nextPhase() {
  const { phases } = getConfig9();
  if(currentPhase < phases.length - 1) goToPhase(currentPhase + 1);
}

function updateNav9() {
  const { phases, panelId } = getConfig9();
  document.getElementById('prev-btn').disabled = currentPhase === 0;
  document.getElementById('next-btn').disabled = currentPhase === phases.length - 1;
  document.getElementById('slide-ctr').textContent = `Phase ${currentPhase + 1} of ${phases.length}`;
  document.querySelectorAll(`#${panelId} .phase-dot`).forEach((d,i) => d.classList.toggle('active', i === currentPhase));
}

function setSubject(s) {
  document.body.className = document.body.className.replace(/\bsubj-\w+\b/g,'').trim()
    + ' subj-' + (s==='cs' ? 'cta' : s==='css' ? 'css' : 'cr');
  ['cr','cs','css'].forEach(x => {
    const btn = document.getElementById('bs'+x);
    if(btn) btn.classList.toggle('active', x===s);
  });
  const labels = { cr:'Collaborative Reading', cs:'Collaborative Science', css:'Collaborative Social Studies' };
  document.getElementById('deck-label').textContent = labels[s] || 'Collaborative Reading';
  currentPhase = 0;
  updateNav9();
}

function setView(v) {
  document.body.classList.toggle('vs', v==='s');
  document.body.classList.toggle('vt', v==='t');
  document.getElementById('bvs').classList.toggle('active', v==='s');
  document.getElementById('bvt').classList.toggle('active', v==='t');
}

document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight') nextPhase();
  if(e.key==='ArrowLeft')  prevPhase();
});

buildPanel9(CR9_PHASES,  'cr9-panel',  'Collaborative Reading',       'cr9');
buildPanel9(CS9_PHASES,  'cs9-panel',  'Collaborative Science',       'cs9');
buildPanel9(CSS9_PHASES, 'css9-panel', 'Collaborative Social Studies', 'css9');
updateNav9();

</script>
